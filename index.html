<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f0ece6">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="כוח + קראטה">
<link rel="manifest" href="manifest.json">
<title>כוח + קראטה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f0ece6;
  --s1:       #e8e2d8;
  --s2:       #ddd6c8;
  --border:   #c8bcaa;
  --accent:   #b5622a;
  --sage:     #5a8050;
  --gold:     #a07820;
  --text:     #2e2418;
  --dim:      #7a6a54;
  --r: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; font-family: 'Heebo', sans-serif; background: var(--bg); color: var(--text); direction: rtl; }

/* ─ HEADER ─ */
.header {
  background: var(--s1); border-bottom: 1px solid var(--border);
  padding: 12px 18px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
}
.logo { font-size: 18px; font-weight: 900; }
.logo span { color: var(--accent); }
.header-date { font-size: 11px; color: var(--dim); margin-top: 1px; }

/* ─ NAV ─ */
.nav {
  display: flex; background: var(--s1);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 57px; z-index: 99;
}
.nav-btn {
  flex: 1; padding: 10px; background: none; border: none;
  border-bottom: 2px solid transparent;
  font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 700;
  color: var(--dim); cursor: pointer; transition: all 0.2s;
}
.nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

/* ─ MAIN ─ */
.main { padding: 14px; max-width: 600px; margin: 0 auto; }
.view { display: none; }
.view.active { display: block; }

/* ─ SECTION HEADER ─ */
.sec-title {
  font-size: 11px; font-weight: 700; color: var(--dim);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
}

/* ─ WEEK GRID ─ */
.week-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }

.day-card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--r); padding: 13px 12px;
  cursor: pointer; position: relative; overflow: hidden;
  transition: border-color 0.2s, background 0.15s;
  -webkit-user-select: none; user-select: none;
}
.day-card:active { background: var(--s2); }
.day-card.clickable:hover { border-color: var(--accent); }
.day-card.rest { opacity: 0.45; cursor: default; }
.day-card.done { border-color: var(--sage); }

.day-pip {
  position: absolute; top: 8px; left: 8px;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--sage); color: #fff;
  font-size: 10px; font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: opacity 0.3s;
}
.day-card.done .day-pip { opacity: 1; }

.day-name  { font-size: 14px; font-weight: 900; margin-bottom: 2px; }
.day-label { font-size: 10px; color: var(--dim); margin-bottom: 8px; }
.day-tag {
  display: inline-block; padding: 2px 8px;
  border-radius: 20px; font-size: 10px; font-weight: 700;
}
.tag-lower    { background: rgba(181,98,42,0.14); color: var(--accent); }
.tag-upper    { background: rgba(160,120,32,0.14); color: var(--gold); }
.tag-karate   { background: rgba(90,128,80,0.14);  color: var(--sage); }
.tag-rest     { background: rgba(122,106,84,0.1);  color: var(--dim); }
.tag-optional { background: rgba(160,120,32,0.14); color: var(--gold); }

/* Summary bar */
.summary {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--r); padding: 13px 16px;
  display: flex; justify-content: space-around;
}
.sum-item { text-align: center; }
.sum-val { font-size: 22px; font-weight: 900; line-height: 1; }
.sum-lbl { font-size: 10px; color: var(--dim); margin-top: 3px; }

/* ─ WORKOUT VIEW ─ */
.back-btn {
  display: inline-flex; align-items: center; gap: 5px;
  background: none; border: 1px solid var(--border);
  border-radius: 8px; padding: 6px 12px;
  font-family: 'Heebo', sans-serif; font-size: 12px; font-weight: 600;
  color: var(--dim); cursor: pointer; margin-bottom: 12px;
  transition: all 0.2s;
}
.back-btn:hover { color: var(--accent); border-color: var(--accent); }

.wo-card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--r); padding: 16px; margin-bottom: 14px;
}
.wo-title { font-size: 20px; font-weight: 900; margin-bottom: 8px; }
.wo-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
.wo-pill {
  font-size: 11px; color: var(--dim);
  background: var(--s2); padding: 3px 9px;
  border-radius: 20px; font-weight: 600;
}
.prog-bar-wrap { height: 4px; background: var(--s2); border-radius: 2px; overflow: hidden; }
.prog-bar-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--accent), #d4824a);
  transition: width 0.4s ease;
}

/* ─ EXERCISE CARD ─ */
.ex-card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--r); margin-bottom: 8px; overflow: hidden;
  transition: border-color 0.2s;
  animation: fadeUp 0.25s ease both;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.ex-card:nth-child(2) { animation-delay: .04s }
.ex-card:nth-child(3) { animation-delay: .08s }
.ex-card:nth-child(4) { animation-delay: .12s }
.ex-card:nth-child(5) { animation-delay: .16s }
.ex-card:nth-child(6) { animation-delay: .20s }
.ex-card:nth-child(7) { animation-delay: .24s }
.ex-card.ex-open  { border-color: var(--accent); }
.ex-card.ex-done  { border-color: var(--sage); opacity: 0.65; }

.ex-head {
  padding: 12px 14px; display: flex; align-items: center;
  gap: 10px; cursor: pointer; -webkit-user-select: none; user-select: none;
}
.ex-num {
  width: 28px; height: 28px; border-radius: 8px; flex-shrink: 0;
  background: var(--s2); display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 900; color: var(--dim);
  transition: all 0.2s;
}
.ex-card.ex-open .ex-num { background: rgba(181,98,42,0.18); color: var(--accent); }
.ex-card.ex-done .ex-num { background: var(--sage); color: #fff; }

.ex-info { flex: 1; min-width: 0; }
.ex-name { font-size: 13px; font-weight: 700; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ex-chips { display: flex; gap: 4px; flex-wrap: wrap; }
.ex-chip  { font-size: 10px; color: var(--dim); background: var(--s2); padding: 2px 6px; border-radius: 4px; }

.ex-chevron { color: var(--dim); transition: transform 0.2s; flex-shrink: 0; }
.ex-card.ex-open .ex-chevron { transform: rotate(180deg); }

.ex-body {
  display: none; border-top: 1px solid var(--border);
  padding: 12px 14px 14px;
}
.ex-card.ex-open .ex-body { display: block; }

.ex-desc { font-size: 12px; color: var(--dim); line-height: 1.7; margin-bottom: 12px; }

/* Weight input */
.wt-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.wt-label { font-size: 12px; color: var(--dim); }
.wt-input {
  width: 72px; padding: 7px 8px; text-align: center;
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-family: 'Heebo', sans-serif; font-size: 16px; font-weight: 700;
  transition: border-color 0.2s;
}
.wt-input:focus { outline: none; border-color: var(--accent); }
.wt-unit { font-size: 12px; color: var(--dim); }
.wt-prev { font-size: 11px; color: var(--dim); margin-right: 4px; }
.wt-prev b { color: var(--gold); }

/* Sets */
.sets-lbl { font-size: 10px; color: var(--dim); margin-bottom: 6px; }
.sets-row  { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.set-dot {
  width: 38px; height: 38px; border-radius: 50%;
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--dim);
  cursor: pointer; transition: all 0.15s; user-select: none;
  flex-direction: column; line-height: 1.1;
}
.set-dot:active { transform: scale(0.88); }
.set-dot.s-next { border-color: var(--gold); color: var(--gold); }
.set-dot.s-done { background: var(--accent); border-color: var(--accent); color: #fff; }
.set-sub { font-size: 8px; opacity: 0.85; }



/* Complete button */
.done-btn {
  width: 100%; padding: 10px; border-radius: 10px;
  background: var(--s2); border: 1px solid var(--border);
  color: var(--dim); font-family: 'Heebo', sans-serif;
  font-size: 13px; font-weight: 700; cursor: pointer;
  transition: all 0.2s;
}
.done-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
.ex-card.ex-done .done-btn { background: rgba(90,128,80,0.1); color: var(--sage); border-color: rgba(90,128,80,0.3); }

/* Finish banner */
.finish-banner {
  background: linear-gradient(135deg, rgba(181,98,42,0.1), rgba(90,128,80,0.08));
  border: 1px solid rgba(181,98,42,0.3);
  border-radius: var(--r); padding: 20px; text-align: center;
  margin-bottom: 14px; display: none;
}
.finish-banner.show { display: block; animation: fadeUp 0.3s ease; }
.finish-icon  { font-size: 32px; margin-bottom: 6px; }
.finish-title { font-size: 18px; font-weight: 900; color: var(--accent); }
.finish-sub   { font-size: 12px; color: var(--dim); margin-top: 4px; }



/* ─ SET LOG MODAL ─ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(46,36,24,0.5);
  z-index: 300; display: none;
  align-items: center; justify-content: center; padding: 20px;
  backdrop-filter: blur(3px);
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 16px; padding: 20px;
  width: 100%; max-width: 300px;
  animation: modalIn 0.2s ease;
}
@keyframes modalIn {
  from { opacity:0; transform:scale(0.9) translateY(8px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}
.modal-title { font-size: 14px; font-weight: 900; margin-bottom: 2px; }
.modal-sub   { font-size: 11px; color: var(--dim); margin-bottom: 14px; }
.modal-label { font-size: 11px; color: var(--dim); font-weight: 700; margin-bottom: 6px; display: block; }
.modal-input {
  width: 100%; padding: 10px; text-align: center;
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text);
  font-family: 'Heebo', sans-serif; font-size: 22px; font-weight: 900;
  transition: border-color 0.2s;
}
.modal-input:focus { outline: none; border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; margin-top: 14px; }
.modal-ok {
  flex: 1; padding: 11px; background: var(--accent); color: #fff;
  border: none; border-radius: 10px;
  font-family: 'Heebo', sans-serif; font-size: 14px; font-weight: 700;
  cursor: pointer;
}
.modal-cancel {
  padding: 11px 16px; background: var(--s2);
  border: 1px solid var(--border); border-radius: 10px;
  font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 600;
  color: var(--dim); cursor: pointer;
}

/* ─ PROGRESS VIEW ─ */
.stats-tabs {
  display: flex; border-radius: 10px; overflow: hidden;
  border: 1px solid var(--border); margin-bottom: 14px;
}
.stats-tab {
  flex: 1; padding: 9px; background: var(--s1); border: none;
  font-family: 'Heebo', sans-serif; font-size: 12px; font-weight: 700;
  color: var(--dim); cursor: pointer; transition: all 0.2s;
}
.stats-tab.active { background: var(--accent); color: #fff; }

.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.kpi-card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--r); padding: 13px; text-align: center;
}
.kpi-val { font-size: 26px; font-weight: 900; line-height: 1; margin-bottom: 3px; }
.kpi-lbl { font-size: 10px; color: var(--dim); }
.kpi-sub { font-size: 9px; color: var(--dim); opacity: 0.7; margin-top: 2px; }

.chart-card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px; margin-bottom: 12px;
}
.chart-title { font-size: 11px; font-weight: 700; color: var(--dim); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
.bar-row { display: flex; align-items: flex-end; gap: 4px; height: 80px; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.bar { width: 100%; border-radius: 4px 4px 0 0; min-height: 3px; transition: height 0.4s ease; }
.bar-val-lbl { font-size: 9px; color: var(--dim); font-weight: 700; }
.bar-x-lbl   { font-size: 9px; color: var(--dim); }

.heatmap { display: flex; gap: 3px; flex-wrap: wrap; }
.hm-cell {
  width: 26px; height: 26px; border-radius: 4px;
  background: var(--s2);
  display: flex; align-items: center; justify-content: center;
  font-size: 8px; color: var(--dim); font-weight: 700;
}
.hm-1 { background: rgba(181,98,42,0.18); color: var(--accent); }
.hm-2 { background: rgba(181,98,42,0.42); color: var(--accent); }
.hm-3 { background: var(--accent); color: #fff; }

.ex-stat-card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
}
.ex-stat-name { font-size: 13px; font-weight: 700; margin-bottom: 8px; }
.ex-stat-row  { display: flex; gap: 6px; flex-wrap: wrap; }
.ex-kpi {
  flex: 1; min-width: 55px; text-align: center;
  background: var(--s2); border-radius: 8px; padding: 7px 6px;
}
.ex-kpi-v { font-size: 16px; font-weight: 900; line-height: 1; }
.ex-kpi-l { font-size: 9px; color: var(--dim); margin-top: 2px; }

/* Cal input */
.cal-card {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: var(--r); padding: 14px; margin-bottom: 14px;
}
.cal-entry-row { display: flex; gap: 8px; align-items: center; }
.cal-input {
  flex: 1; padding: 9px; text-align: center;
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-family: 'Heebo', sans-serif; font-size: 18px; font-weight: 700;
}
.cal-input:focus { outline: none; border-color: var(--accent); }
.cal-save {
  padding: 9px 16px; background: var(--accent); color: #fff;
  border: none; border-radius: 8px;
  font-family: 'Heebo', sans-serif; font-size: 13px; font-weight: 700;
  cursor: pointer;
}
.cal-last { font-size: 11px; color: var(--dim); margin-top: 8px; }
.cal-last b { color: var(--gold); }

.reset-btn {
  display: block; margin: 16px auto 0;
  background: none; border: 1px solid var(--border);
  color: var(--dim); padding: 8px 18px;
  border-radius: 8px; cursor: pointer;
  font-family: 'Heebo', sans-serif; font-size: 12px;
  transition: all 0.2s;
}
.reset-btn:hover { border-color: var(--accent); color: var(--accent); }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div>
    <div class="logo">כוח<span>+</span>קראטה</div>
    <div class="header-date" id="hdrDate"></div>
  </div>
  <div id="hdrStreak" style="font-size:12px;color:var(--dim)"></div>
</div>

<!-- NAV -->
<div class="nav">
  <button class="nav-btn active" onclick="showView('week')">לוח שבועי</button>
  <button class="nav-btn" onclick="showView('progress')">התקדמות</button>
</div>



<!-- SET MODAL -->
<div class="modal-overlay" id="setModal">
  <div class="modal">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-sub"   id="modalSub"></div>
    <label class="modal-label" id="modalLabel"></label>
    <input class="modal-input" id="modalInput" type="number" min="1">
    <div class="modal-btns">
      <button class="modal-ok"     onclick="confirmSet()">✓ אישור</button>
      <button class="modal-cancel" onclick="closeModal()">ביטול</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- ══ WEEK VIEW ══ -->
  <div class="view active" id="view-week">
    <div style="font-size:17px;font-weight:900;margin-bottom:12px">השבוע שלי 💪</div>
    <div class="week-grid" id="weekGrid"></div>
    <div class="summary">
      <div class="sum-item">
        <div class="sum-val" style="color:var(--accent)" id="sumWo">0</div>
        <div class="sum-lbl">אימונים</div>
      </div>
      <div class="sum-item">
        <div class="sum-val" style="color:var(--gold)" id="sumVol">0</div>
        <div class="sum-lbl">נפח (ק"ג)</div>
      </div>
      <div class="sum-item">
        <div class="sum-val" style="color:var(--sage)" id="sumStr">0</div>
        <div class="sum-lbl">רצף ימים</div>
      </div>
    </div>
  </div>

  <!-- ══ WORKOUT VIEW ══ -->
  <div class="view" id="view-workout">
    <button class="back-btn" onclick="goBack()">← חזרה</button>
    <div class="wo-card" id="woCard"></div>
    <div class="finish-banner" id="finishBanner">
      <div class="finish-icon">🌿</div>
      <div class="finish-title">אימון הושלם!</div>
      <div class="finish-sub" id="finishSub"></div>
      <div style="margin-top:14px;display:flex;flex-direction:column;gap:10px">
        <div class="wt-row" style="justify-content:center">
          <span class="wt-label">משך האימון:</span>
          <input class="wt-input" type="number" id="woDur" placeholder="55" style="width:70px">
          <span class="wt-unit">דק'</span>
        </div>
        <div class="wt-row" style="justify-content:center">
          <span class="wt-label">קלוריות:</span>
          <input class="wt-input" type="number" id="woCal" placeholder="—" style="width:70px">
          <span class="wt-unit">קק"ל</span>
        </div>
        <button onclick="saveWoExtras()" style="padding:8px 20px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:'Heebo',sans-serif;font-size:13px;font-weight:700;cursor:pointer">שמור</button>
      </div>
    </div>
    <div id="exList"></div>
  </div>


  <!-- ══ ACTIVITY VIEW ══ -->
  <div class="view" id="view-activity">
    <button class="back-btn" onclick="goBack()">← חזרה</button>
    <div class="wo-card" id="actHeader"></div>
    <div style="background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:12px">
      <div class="sec-title" style="margin-bottom:14px">פרטי האימון</div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="wt-row">
          <span class="wt-label" style="min-width:90px">משך האימון:</span>
          <input class="wt-input" type="number" id="actDur" placeholder="60" style="width:70px">
          <span class="wt-unit">דק'</span>
        </div>
        <div class="wt-row">
          <span class="wt-label" style="min-width:90px">קלוריות:</span>
          <input class="wt-input" type="number" id="actCal" placeholder="—" style="width:70px">
          <span class="wt-unit">קק"ל</span>
        </div>
        <div class="wt-row">
          <span class="wt-label" style="min-width:90px">הערה:</span>
          <input class="wt-input" type="text" id="actNote" placeholder="..." style="width:130px;font-size:13px">
        </div>
      </div>
    </div>
    <button class="done-btn" id="actSaveBtn" onclick="saveActivity()" style="background:var(--sage);color:#fff;border-color:var(--sage)">
      ✓ שמור אימון
    </button>
  </div>

  <!-- ══ PROGRESS VIEW ══ -->
  <div class="view" id="view-progress">
    <div class="stats-tabs">
      <button class="stats-tab active" onclick="switchTab('overview')">סקירה</button>
      <button class="stats-tab" onclick="switchTab('exercises')">תרגילים</button>
      <button class="stats-tab" onclick="switchTab('calories')">קלוריות</button>
    </div>

    <div id="tab-overview"></div>
    <div id="tab-exercises" style="display:none"></div>
    <div id="tab-calories"  style="display:none"></div>

    <button class="reset-btn" onclick="resetWeek()">איפוס שבוע נוכחי</button>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════════
//  DATA
// ══════════════════════════════════════════════════════

//  STATE
// ══════════════════════════════════════════════════════
let S = {};
let curKey = null;
let modalEx = -1, modalSet = -1;
let curTab = 'overview';

function loadS() { try { S = JSON.parse(localStorage.getItem('zk2') || '{}'); } catch { S = {}; } }
function saveS() { try { localStorage.setItem('zk2', JSON.stringify(S)); } catch {} }

function weekKey() {
  const d = new Date(), m = new Date(d);
  m.setDate(d.getDate() - (d.getDay() === 0 ? 6 : d.getDay()-1));
  return 'wk_' + m.toISOString().slice(0,10);
}
function todayKey() { return new Date().toISOString().slice(0,10); }

// ══════════════════════════════════════════════════════
//  VIEW ROUTING
// ══════════════════════════════════════════════════════
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  const idx = ['week','progress'].indexOf(name);
  if (idx >= 0) document.querySelectorAll('.nav-btn')[idx].classList.add('active');
  if (name === 'progress') renderProgress();
}

function goBack() {
  showView('week');
  renderWeek();
}

// ══════════════════════════════════════════════════════
//  WEEK VIEW
// ══════════════════════════════════════════════════════
function renderWeek() {
  const grid = document.getElementById('weekGrid');
  const done = S[weekKey()]?.done || [];
  grid.innerHTML = '';

  WEEK_PLAN.forEach((d, i) => {
    const isDone = done.includes(i);
    const isRest = d.type === 'rest' && !d.karate;
    const el = document.createElement('div');
    el.className = 'day-card' + (isRest ? ' rest' : ' clickable') + (isDone ? ' done' : '');
    const pilatesTag = d.pilates
      ? '<span class="day-tag" style="background:rgba(90,128,80,0.12);color:var(--sage);margin-top:5px;display:inline-block;cursor:pointer" id="plt-' + i + '">🧘 פילאטיס</span>'
      : '';
    el.innerHTML =
      '<div class="day-pip">✓</div>' +
      '<div class="day-name">' + d.day + '</div>' +
      '<div class="day-label">' + d.label + '</div>' +
      '<span class="day-tag ' + d.tag + '">' + (TAG_LABEL[d.type]||'') + '</span>' +
      pilatesTag;
    if (!isRest && d.key) el.onclick = () => openWorkout(d.key, i);
    if (d.karate) el.onclick = () => openActivity('karate', i);
    grid.appendChild(el);
    if (d.pilates) {
      const pt = document.getElementById('plt-' + i);
      if (pt) pt.onclick = (e) => { e.stopPropagation(); openActivity('pilates', i); };
    }
  });

  // Summary
  document.getElementById('sumWo').textContent  = done.length;
  document.getElementById('sumStr').textContent = S.streak || 0;

  // Weekly volume from history
  const wk = weekKey().replace('wk_', '');
  const wkEnd = new Date(new Date(wk).getTime() + 6*864e5).toISOString().slice(0,10);
  const vol = Object.entries(S.history || {})
    .filter(([d]) => d >= wk && d <= wkEnd)
    .flatMap(([,e]) => e)
    .reduce((s,e) => s + (parseFloat(e.weight)||0)*(e.reps||0), 0);
  document.getElementById('sumVol').textContent = Math.round(vol);
}

function openWorkout(key, dayIdx) {
  curKey = key;
  S._start = Date.now();
  const w = WORKOUTS[key];
  const sk = key + '_s';
  if (!S[sk]) S[sk] = {};

  // Hero card
  document.getElementById('woCard').innerHTML = `
    <div class="wo-title">${w.title}</div>
    <div class="wo-pills">
      <span class="wo-pill">⏱ ${w.duration}</span>
      <span class="wo-pill">🎯 ${w.focus}</span>
      <span class="wo-pill">💪 ${w.exercises.filter(e=>!e.warmup).length} תרגילים</span>
    </div>
    <div class="prog-bar-wrap"><div class="prog-bar-fill" id="progFill" style="width:0%"></div></div>`;

  document.getElementById('finishBanner').classList.remove('show');

  // Build exercise cards
  const list = document.getElementById('exList');
  list.innerHTML = '';
  w.exercises.forEach((ex, i) => buildExCard(ex, i, sk, dayIdx, list));

  // Open first non-warmup
  toggleEx(1);
  showView('workout');
}

function buildExCard(ex, i, sk, dayIdx, list) {
  const sess = S[sk]?.[i] || { sets:0, done:false, setData:{} };
  const savedW = S.weights?.[ex.name] || '';

  const card = document.createElement('div');
  card.id = 'exc-' + i;
  card.className = 'ex-card' + (sess.done ? ' ex-done' : '');

  // Sets html
  let setsHtml = '';
  for (let s=0; s<ex.sets; s++) {
    const cls = s < sess.sets ? 's-done' : s === sess.sets ? 's-next' : '';
    const data = sess.setData?.[s];
    const isTimer = !!ex.timer;
    const subLbl = data && s < sess.sets ? (isTimer ? data.time+'"' : data.reps+'×') : (s+1);
    setsHtml += `<div class="set-dot ${cls}" id="sd-${i}-${s}" onclick="tapSet(${i},${s})">${subLbl}</div>`;
  }

  const wtHtml = ex.warmup ? '' : `
    <div class="wt-row">
      <span class="wt-label">משקל:</span>
      <input class="wt-input" type="number" step="0.5" value="${savedW}" placeholder="—"
        onchange="saveWeight('${ex.name.replace(/'/g,"\\'")}',this.value)">
      <span class="wt-unit">ק"ג</span>
      ${savedW ? `<span class="wt-prev">קודם: <b>${savedW}</b></span>` : ''}
    </div>`;

  const tmHtml = '';

  card.innerHTML = `
    <div class="ex-head" onclick="toggleEx(${i})">
      <div class="ex-num" id="exn-${i}">${sess.done ? '✓' : i+1}</div>
      <div class="ex-info">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-chips">
          <span class="ex-chip">${ex.sets} × ${ex.reps}</span>
          <span class="ex-chip">${ex.eq}</span>
        </div>
      </div>
      <div class="ex-chevron">▾</div>
    </div>
    <div class="ex-body">
      <div class="ex-desc">${ex.desc}</div>
      ${wtHtml}
      <div class="sets-lbl">לחצי על סט לסמן ✓</div>
      <div class="sets-row" id="sr-${i}">${setsHtml}</div>
      <button class="done-btn" id="db-${i}" onclick="toggleDone(${i},${dayIdx})">
        ${sess.done ? '✓ הושלם' : 'סמני כהושלם'}
      </button>
    </div>`;
  list.appendChild(card);
}

function toggleEx(i) {
  document.getElementById('exc-' + i)?.classList.toggle('ex-open');
}

// ── SET LOGGING ──
function tapSet(ei, si) {
  const sk = curKey + '_s';
  if (!S[sk]) S[sk] = {};
  if (!S[sk][ei]) S[sk][ei] = { sets:0, done:false, setData:{} };
  if (!S[sk][ei].setData) S[sk][ei].setData = {};

  // Undo if already done
  if (si < S[sk][ei].sets) {
    S[sk][ei].sets = si;
    delete S[sk][ei].setData[si];
    saveS(); refreshSets(ei); return;
  }

  // Open modal
  const ex = WORKOUTS[curKey].exercises[ei];
  modalEx = ei; modalSet = si;
  const prev = S[sk][ei].setData[si];
  document.getElementById('modalTitle').textContent = ex.name;
  document.getElementById('modalSub').textContent   = `סט ${si+1} מתוך ${ex.sets}`;
  document.getElementById('modalLabel').textContent = 'חזרות בפועל';
  document.getElementById('modalInput').value = prev?.reps || '';
  document.getElementById('modalInput').placeholder = ex.reps.toString().split('-')[0];
  document.getElementById('setModal').classList.add('show');
  setTimeout(() => document.getElementById('modalInput')?.focus(), 120);
}

function confirmSet() {
  const val = parseInt(document.getElementById('modalInput').value);
  if (!val || val < 1) { closeModal(); return; }

  const sk = curKey + '_s';
  const ex = WORKOUTS[curKey].exercises[modalEx];
  const w = parseFloat(S.weights?.[ex.name]) || 0;

  S[sk][modalEx].setData[modalSet] = { reps:val };
  S[sk][modalEx].sets = modalSet + 1;
  S.totalSets = (S.totalSets||0) + 1;

  // Log to history
  if (!S.history) S.history = {};
  const td = todayKey();
  if (!S.history[td]) S.history[td] = [];
  S.history[td].push({
    workout: curKey, exercise: ex.name, set: modalSet+1,
    weight: w || null,
    reps:val,
    ts: Date.now()
  });

  saveS();
  refreshSets(modalEx);
  updateProgress();
  closeModal();

}

function closeModal() {
  document.getElementById('setModal').classList.remove('show');
  modalEx = -1; modalSet = -1;
}

function refreshSets(ei) {
  const sk = curKey + '_s';
  const sess = S[sk]?.[ei] || { sets:0, setData:{} };
  const ex = WORKOUTS[curKey].exercises[ei];
  const row = document.getElementById('sr-' + ei);
  if (!row) return;
  for (let s=0; s<ex.sets; s++) {
    const dot = document.getElementById(`sd-${ei}-${s}`);
    if (!dot) continue;
    const isDone = s < sess.sets;
    const isNext = s === sess.sets;
    dot.className = 'set-dot' + (isDone ? ' s-done' : isNext ? ' s-next' : '');
    const data = sess.setData?.[s];
    dot.textContent = data && isDone ? data.reps+'×' : (s+1);
  }
}

function updateProgress() {
  const sk = curKey + '_s';
  const exs = WORKOUTS[curKey].exercises;
  const doneCount = exs.filter((_,i) => S[sk]?.[i]?.done).length;
  const pct = Math.round(doneCount/exs.length*100);
  const fill = document.getElementById('progFill');
  if (fill) fill.style.width = pct+'%';
}

function toggleDone(ei, dayIdx) {
  const sk = curKey + '_s';
  if (!S[sk]) S[sk] = {};
  if (!S[sk][ei]) S[sk][ei] = { sets:0, done:false, setData:{} };
  S[sk][ei].done = !S[sk][ei].done;

  const card = document.getElementById('exc-' + ei);
  card.classList.toggle('ex-done', S[sk][ei].done);
  document.getElementById('db-' + ei).textContent = S[sk][ei].done ? '✓ הושלם' : 'סמני כהושלם';
  document.getElementById('exn-' + ei).textContent = S[sk][ei].done ? '✓' : ei+1;

  updateProgress();

  // Check if all done
  const allDone = WORKOUTS[curKey].exercises.every((_,i) => S[sk]?.[i]?.done);
  if (allDone) {
    markDayDone(dayIdx);
    const b = document.getElementById('finishBanner');
    b.classList.add('show');
    document.getElementById('finishSub').textContent =
      `${WORKOUTS[curKey].exercises.length} תרגילים • ${WORKOUTS[curKey].duration}`;
    b.scrollIntoView({ behavior:'smooth' });
  }
  saveS();
}

function markDayDone(idx) {
  const wk = weekKey();
  if (!S[wk]) S[wk] = { done:[] };
  if (!S[wk].done.includes(idx)) {
    S[wk].done.push(idx);
    S.totalWorkouts = (S.totalWorkouts||0) + 1;
    S.streak = (S.streak||0) + 1;
    // Track duration
    if (S._start) {
      const min = Math.round((Date.now()-S._start)/60000);
      if (!S.durations) S.durations = {};
      S.durations[todayKey()] = min;
    }
    saveS();
  }
}

function saveWeight(name, val) {
  if (!S.weights) S.weights = {};
  S.weights[name] = val;
  saveS();
}



// ══════════════════════════════════════════════════════
//  PROGRESS VIEW
// ══════════════════════════════════════════════════════
function switchTab(tab) {
  curTab = tab;
  ['overview','exercises','calories'].forEach(t => {
    document.getElementById('tab-'+t).style.display = t===tab ? 'block' : 'none';
  });
  document.querySelectorAll('.stats-tab').forEach((b,i) => {
    b.classList.toggle('active', ['overview','exercises','calories'][i]===tab);
  });
  renderTab(tab);
}

function renderProgress() { renderTab(curTab); }
function renderTab(tab) {
  if (tab==='overview')  renderOverview();
  else if (tab==='exercises') renderExercises();
  else renderCalories();
}

function allEntries() { return Object.values(S.history||{}).flat(); }

function renderOverview() {
  const entries = allEntries();
  const now = new Date();

  // Total volume
  const vol = entries.reduce((s,e)=>s+(parseFloat(e.weight)||0)*(e.reps||0),0);

  // Avg duration
  const durs = Object.values(S.durations||{});
  const avgDur = durs.length ? Math.round(durs.reduce((a,b)=>a+b,0)/durs.length) : null;

  // This month
  const monthPfx = now.toISOString().slice(0,7);
  const monthWo = Object.keys(S.history||{}).filter(d=>d.startsWith(monthPfx)).length;

  const el = document.getElementById('tab-overview');
  el.innerHTML = '';

  // KPIs
  const kpiData = [
    { val: S.totalWorkouts||0, lbl:'אימונים סה"כ',    color:'var(--accent)' },
    { val: S.streak||0,        lbl:'רצף ימים 🔥',      color:'var(--sage)' },
    { val: Math.round(vol).toLocaleString(), lbl:'נפח כולל (ק"ג)', color:'var(--gold)', sub:'משקל × חזרות' },
    { val: S.totalSets||0,     lbl:'סטים בוצעו',      color:'var(--dim)' },
    { val: avgDur ? avgDur+'\'':'—', lbl:'זמן ממוצע לאימון', color:'var(--dim)' },
    { val: monthWo,            lbl:'אימונים החודש',    color:'var(--accent)' },
  ];
  const grid = document.createElement('div');
  grid.className = 'kpi-grid';
  kpiData.forEach(k => {
    grid.innerHTML += `
      <div class="kpi-card">
        <div class="kpi-val" style="color:${k.color}">${k.val}</div>
        <div class="kpi-lbl">${k.lbl}</div>
        ${k.sub ? `<div class="kpi-sub">${k.sub}</div>` : ''}
      </div>`;
  });
  el.appendChild(grid);

  // Weekly volume chart
  const weekVols = {};
  entries.forEach(e => {
    if (!e.reps||!e.weight) return;
    const d = new Date(e.ts), m = new Date(d);
    m.setDate(d.getDate()-(d.getDay()===0?6:d.getDay()-1));
    const wk = m.toISOString().slice(0,10);
    weekVols[wk] = (weekVols[wk]||0) + (parseFloat(e.weight)*e.reps);
  });
  const wks = Object.keys(weekVols).sort().slice(-6);
  const maxV = Math.max(...wks.map(w=>weekVols[w]),1);
  const nowMon = (() => { const d=new Date(),m=new Date(d); m.setDate(d.getDate()-(d.getDay()===0?6:d.getDay()-1)); return m.toISOString().slice(0,10); })();

  const volChart = document.createElement('div');
  volChart.className = 'chart-card';
  volChart.innerHTML = '<div class="chart-title">נפח שבועי (ק"ג)</div><div class="bar-row" id="volBars"></div>';
  el.appendChild(volChart);

  setTimeout(() => {
    const bars = document.getElementById('volBars');
    if (!bars) return;
    if (!wks.length) { bars.innerHTML='<div style="color:var(--dim);font-size:12px;width:100%;text-align:center;padding:20px">עדיין אין נתונים 🌱</div>'; return; }
    wks.forEach((wk,i) => {
      const v = weekVols[wk]||0;
      const h = Math.round((v/maxV)*68);
      const isNow = wk===nowMon;
      const col = document.createElement('div');
      col.className = 'bar-col';
      col.innerHTML = `
        <div class="bar-val-lbl">${v>0?Math.round(v/1000)+'k':''}</div>
        <div class="bar" style="height:${h}px;background:${isNow?'var(--accent)':'var(--s2)'};border:1px solid ${isNow?'var(--accent)':'var(--border)'}"></div>
        <div class="bar-x-lbl">ש${i+1}</div>`;
      bars.appendChild(col);
    });
  }, 0);

  // Heatmap
  const hmCard = document.createElement('div');
  hmCard.className = 'chart-card';
  hmCard.innerHTML = '<div class="chart-title">פעילות — 28 ימים אחרונים</div><div class="heatmap" id="hmCells"></div>';
  el.appendChild(hmCard);

  setTimeout(() => {
    const hm = document.getElementById('hmCells');
    if (!hm) return;
    const days = ['א','ב','ג','ד','ה','ו','ש'];
    for (let i=27; i>=0; i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      const dk = d.toISOString().slice(0,10);
      const cnt = (S.history?.[dk]||[]).length;
      const lvl = cnt===0?0:cnt<5?1:cnt<15?2:3;
      const cell = document.createElement('div');
      cell.className = 'hm-cell' + (lvl?' hm-'+lvl:'');
      cell.textContent = i===0?'★':days[d.getDay()];
      hm.appendChild(cell);
    }
  }, 0);
}

function renderExercises() {
  const el = document.getElementById('tab-exercises');
  el.innerHTML = '';
  const entries = allEntries();
  if (!entries.length) {
    el.innerHTML = '<div style="color:var(--dim);text-align:center;padding:24px;font-size:13px">עדיין אין נתונים 🌱</div>';
    return;
  }
  const byEx = {};
  entries.forEach(e => { if(!byEx[e.exercise]) byEx[e.exercise]=[]; byEx[e.exercise].push(e); });
  Object.entries(byEx).forEach(([name, exEntries]) => {
    const vals  = exEntries.map(e=>e.reps).filter(Boolean);
    const best  = Math.max(...vals);
    const avg   = Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
    const w     = parseFloat(S.weights?.[name])||0;
    const vol   = exEntries.reduce((s,e)=>(s+(parseFloat(e.weight)||w)*(e.reps||0)),0);
    const trend = vals.length>1?(vals[vals.length-1]>=vals[vals.length-2]?'↑':'↓'):'—';
    const tColor = trend==='↑'?'var(--sage)':trend==='↓'?'var(--accent)':'var(--dim)';
    const lastDate = exEntries[exEntries.length-1]?.ts
      ? new Date(exEntries[exEntries.length-1].ts).toLocaleDateString('he-IL') : '';

    const card = document.createElement('div');
    card.className = 'ex-stat-card';
    card.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
        <div class="ex-stat-name" style="margin-bottom:0">${name}</div>
        <div style="font-size:10px;color:var(--dim)">${lastDate}</div>
      </div>
      <div class="ex-stat-row">
        ${w?`<div class="ex-kpi"><div class="ex-kpi-v" style="color:var(--accent)">${w}</div><div class="ex-kpi-l">ק"ג</div></div>`:''}
        <div class="ex-kpi"><div class="ex-kpi-v" style="color:var(--gold)">${best}</div><div class="ex-kpi-l">חז׳ מקס</div></div>
        <div class="ex-kpi"><div class="ex-kpi-v">${avg}</div><div class="ex-kpi-l">חז׳ ממוצע</div></div>
        ${vol>0?`<div class="ex-kpi"><div class="ex-kpi-v" style="color:var(--gold)">${Math.round(vol)}</div><div class="ex-kpi-l">נפח (ק"ג)</div></div>`:''}
        <div class="ex-kpi"><div class="ex-kpi-v" style="color:${tColor}">${trend}</div><div class="ex-kpi-l">מגמה</div></div>
        <div class="ex-kpi"><div class="ex-kpi-v" style="color:var(--dim)">${exEntries.length}</div><div class="ex-kpi-l">סטים</div></div>
      </div>`;
    el.appendChild(card);
  });
}

function renderCalories() {
  const el = document.getElementById('tab-calories');
  const cal = S.calories || {};
  const dates = Object.keys(cal).sort();
  const lastD = dates[dates.length-1];
  const lastV = lastD ? cal[lastD] : null;

  // Weekly total
  const now = new Date(), m = new Date(now);
  m.setDate(now.getDate()-(now.getDay()===0?6:now.getDay()-1));
  const wkS = m.toISOString().slice(0,10);
  const wkE = new Date(m.getTime()+6*864e5).toISOString().slice(0,10);
  const wkTotal = dates.filter(d=>d>=wkS&&d<=wkE).reduce((s,d)=>s+(cal[d]||0),0);
  const mnPfx = now.toISOString().slice(0,7);
  const mnTotal = dates.filter(d=>d.startsWith(mnPfx)).reduce((s,d)=>s+(cal[d]||0),0);
  const allVals = dates.map(d=>cal[d]).filter(Boolean);
  const avg = allVals.length ? Math.round(allVals.reduce((a,b)=>a+b,0)/allVals.length) : 0;

  el.innerHTML = `
    <div class="cal-card">
      <div class="sec-title" style="margin-bottom:10px">רשמי קלוריות לאימון</div>
      <div class="cal-entry-row">
        <input class="cal-input" type="number" id="calIn" placeholder='קק"ל'>
        <button class="cal-save" onclick="saveCal()">שמור</button>
      </div>
      ${lastV ? `<div class="cal-last">אחרון (${lastD?.slice(5).replace('-','/')}): <b>${lastV} קק"ל</b></div>` : ''}
    </div>
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-val" style="color:var(--gold)">${lastV||'—'}</div><div class="kpi-lbl">אימון אחרון</div></div>
      <div class="kpi-card"><div class="kpi-val" style="color:var(--accent)">${wkTotal||'—'}</div><div class="kpi-lbl">שבוע זה</div></div>
      <div class="kpi-card"><div class="kpi-val" style="color:var(--sage)">${mnTotal||'—'}</div><div class="kpi-lbl">החודש</div></div>
      <div class="kpi-card"><div class="kpi-val" style="color:var(--dim)">${avg||'—'}</div><div class="kpi-lbl">ממוצע לאימון</div></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">קלוריות לאימון — אחרונים</div>
      <div class="bar-row" id="calBars"></div>
    </div>`;

  setTimeout(() => {
    const bars = document.getElementById('calBars');
    if (!bars) return;
    const calDates = dates.slice(-10);
    if (!calDates.length) { bars.innerHTML='<div style="color:var(--dim);font-size:12px;width:100%;text-align:center;padding:20px">עדיין אין נתונים 🌱</div>'; return; }
    const maxC = Math.max(...calDates.map(d=>cal[d]||0),1);
    calDates.forEach(d => {
      const v = cal[d]||0, h = Math.round((v/maxC)*68);
      const col = document.createElement('div');
      col.className = 'bar-col';
      col.innerHTML = `
        <div class="bar-val-lbl">${v}</div>
        <div class="bar" style="height:${h}px;background:var(--gold);opacity:0.75"></div>
        <div class="bar-x-lbl">${d.slice(5).replace('-','/')}</div>`;
      bars.appendChild(col);
    });
  }, 0);
}

function saveCal() {
  const val = parseInt(document.getElementById('calIn')?.value);
  if (!val||val<1) return;
  if (!S.calories) S.calories = {};
  S.calories[todayKey()] = val;
  saveS();
  renderCalories();
}

function resetWeek() {
  if (!confirm('לאפס נתוני השבוע?')) return;
  const wk = weekKey();
  delete S[wk];
  Object.keys(S).forEach(k => { if (k.endsWith('_s')) delete S[k]; });
  saveS();
  renderWeek();
}

// ══════════════════════════════════════════════════════
//  ACTIVITY LOG (קראטה / פילאטיס / כוח)
// ══════════════════════════════════════════════════════
const ACTIVITY_META = {
  karate:  { icon:'🥋', title:'אימון קראטה',   markDay:true  },
  pilates: { icon:'🧘', title:'אימון פילאטיס',  markDay:false },
};
let curAct = { type:'', dayIdx:-1 };

function openActivity(type, dayIdx) {
  curAct = { type, dayIdx };
  const meta = ACTIVITY_META[type];
  const td  = todayKey();
  const key = type + '_' + dayIdx;
  const prev = S.actLog?.[td]?.[key];
  document.getElementById('actDur').value  = prev?.dur  || '';
  document.getElementById('actCal').value  = prev?.cal  || '';
  document.getElementById('actNote').value = prev?.note || '';
  document.getElementById('actHeader').innerHTML =
    '<div class="wo-title">' + meta.icon + ' ' + meta.title + '</div>' +
    '<div class="wo-pills"><span class="wo-pill">רשמי פרטי האימון</span></div>';
  const done = S[weekKey()]?.done || [];
  document.getElementById('actSaveBtn').textContent =
    done.includes(dayIdx) && meta.markDay ? '✓ עדכני אימון' : '✓ שמור אימון';
  showView('activity');
}

function saveActivity() {
  const dur  = parseInt(document.getElementById('actDur').value)  || null;
  const cal  = parseInt(document.getElementById('actCal').value)  || null;
  const note = document.getElementById('actNote').value || '';
  const { type, dayIdx } = curAct;
  const meta = ACTIVITY_META[type];
  const td   = todayKey();
  const key  = type + '_' + dayIdx;

  if (!S.actLog) S.actLog = {};
  if (!S.actLog[td]) S.actLog[td] = {};
  S.actLog[td][key] = { type, dur, cal, note, ts: Date.now() };

  if (cal) { if (!S.calories)  S.calories  = {}; S.calories[td]  = (S.calories[td]||0) + cal; }
  if (dur) { if (!S.durations) S.durations = {}; S.durations[td] = dur; }

  if (!S.history) S.history = {};
  if (!S.history[td]) S.history[td] = [];
  S.history[td].push({ workout:type, exercise:meta.title, dur, cal, ts:Date.now() });

  if (meta.markDay && dayIdx >= 0) {
    const wk = weekKey();
    if (!S[wk]) S[wk] = { done:[] };
    if (!S[wk].done.includes(dayIdx)) {
      S[wk].done.push(dayIdx);
      S.totalWorkouts = (S.totalWorkouts||0) + 1;
      S.streak = (S.streak||0) + 1;
    }
  }

  saveS();
  document.getElementById('actSaveBtn').textContent = '✓ נשמר!';
  setTimeout(() => goBack(), 700);
}

function saveWoExtras() {
  const dur = parseInt(document.getElementById('woDur')?.value) || null;
  const cal = parseInt(document.getElementById('woCal')?.value) || null;
  const td  = todayKey();
  if (dur) { if (!S.durations) S.durations = {}; S.durations[td] = dur; }
  if (cal) { if (!S.calories)  S.calories  = {}; S.calories[td]  = cal; }
  saveS();
  const btn = document.querySelector('#finishBanner button');
  if (btn) { btn.textContent = '✓ נשמר'; btn.style.background = 'var(--sage)'; }
}

// ══════════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════════
function init() {
  loadS();
  const DAYS   = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
  const MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const now = new Date();
  document.getElementById('hdrDate').textContent =
    `${DAYS[now.getDay()]}, ${now.getDate()} ב${MONTHS[now.getMonth()]}`;
  document.getElementById('hdrStreak').textContent = S.streak ? `🔥 ${S.streak}` : '';
  renderWeek();
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

init();
</script>
