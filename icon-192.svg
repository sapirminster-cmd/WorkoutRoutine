<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" rx="38" fill="#f5f0e8"/>
  
  <!-- Beige circle -->
  <circle cx="96" cy="100" r="76" fill="#d4b8a8"/>
  
  <!-- Neck/collar base (gray) -->
  <ellipse cx="96" cy="62" rx="14" ry="16" fill="#9a9490"/>
  
  <!-- Main gi body (white) -->
  <path d="M46,80 L146,80 L150,175 L42,175 Z" fill="#f8f6f2"/>
  
  <!-- Left sleeve -->
  <path d="M46,80 L12,118 L20,128 L54,95 Z" fill="#f0eeea"/>
  <!-- Left sleeve shadow -->
  <path d="M12,118 L20,128 L16,132 L8,122 Z" fill="#c8c4bc"/>
  
  <!-- Right sleeve -->
  <path d="M146,80 L180,118 L172,128 L138,95 Z" fill="#f0eeea"/>
  <!-- Right sleeve shadow -->
  <path d="M180,118 L172,128 L176,132 L184,122 Z" fill="#c8c4bc"/>
  
  <!-- Right lapel (crosses over) -->
  <path d="M96,68 L70,100 L66,175 L92,175 Z" fill="#e8e4de"/>
  
  <!-- Left lapel -->
  <path d="M96,68 L122,100 L126,175 L100,175 Z" fill="#ece8e2"/>
  
  <!-- Collar shadow strip -->
  <path d="M88,62 L96,78 L104,62 L100,58 L96,60 L92,58 Z" fill="#b0aaa2"/>
  
  <!-- Belt (dark charcoal) -->
  <rect x="44" y="122" width="104" height="14" rx="4" fill="#4a4640"/>
  <!-- Belt highlight -->
  <rect x="46" y="123" width="100" height="3" rx="2" fill="#5e5a54" opacity="0.6"/>
  
  <!-- Belt knot -->
  <rect x="82" y="118" width="28" height="22" rx="5" fill="#3a3632"/>
  <!-- Knot highlight -->
  <rect x="85" y="121" width="22" height="7" rx="3" fill="#524e48" opacity="0.7"/>
  
  <!-- Belt tail left -->
  <rect x="85" y="140" width="9" height="32" rx="3" fill="#4a4640"/>
  <!-- Belt tail right -->
  <rect x="98" y="140" width="9" height="28" rx="3" fill="#4a4640"/>
</svg>
